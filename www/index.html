<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=https://highpoints.work/next/login" />
    <meta name="robots" content="noindex" />
    <title>High Point Ops</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100vh;
        background: #0b0a12;
        color: #eae8f0;
        font-family: "DM Sans", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.42);
        padding: 28px;
        text-align: center;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
        margin-bottom: 12px;
      }

      p {
        color: #b9b5c8;
        line-height: 1.6;
      }

      a {
        color: #0b0a12;
        background: linear-gradient(135deg, #e0c464, #c9a240);
        border-radius: 999px;
        display: inline-block;
        font-weight: 800;
        margin-top: 18px;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Launching HighPoint Operations</h1>
      <p>The app now opens through the production sign-in route instead of the retired bundle loader.</p>
      <a href="https://highpoints.work/next/login">Open the app</a>
    </main>
  </body>
</html>
